spring:
  application:
    name: roubometro-batch
  batch:
    jdbc:
      initialize-schema: always
      table-prefix: BATCH_
    job:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_batch
    out-of-order: false

roubometro:
  portal:
    csv-url: https://www.ispdados.rj.gov.br/Arquivos/BaseMunicipioMensal.csv
    scraping-url: https://www.ispdados.rj.gov.br/estatistica.html
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
    retry-attempts: 3
    retry-backoff-ms: 2000
  batch:
    chunk-size: 500
    skip-limit: 100
    temp-dir: /tmp/roubometro
    csv-encoding: ISO-8859-1
    csv-delimiter: ";"
    include-zero-values: false
